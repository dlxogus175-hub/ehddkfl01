<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>오늘의 빵</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <div class="wrap">

        <header class="header">
            <div class="inner">

                <h1 class="logo">
                    <img src="./img/logo01.jpg" alt="logo">
                </h1>

                <nav class="gnb">
                    <ul>
                        <li><a href="#">Bakery</a></li>
                        <li><a href="#">Bread</a></li>
                        <li><a href="#">Cafe</a></li>
                        <li><a href="#">Contact</a></li>
                    </ul>
                </nav>

            </div>
        </header>


        <section class="main_visual">
            <div class="inner">
                <h2>Fresh Bread Everyday</h2>
                <p>매일 아침 구워내는 따뜻한 빵</p>
            </div>
        </section>


        <section class="bread_menu">
            <div class="inner">

                <div class="title">
                    <h2>Signature Bread</h2>
                </div>

                <div class="menu_wrap">

                    <div class="item">
                        <img src="./img/main_info01.png">
                        <h3>Croissant</h3>
                        <p>버터 향이 가득한 프랑스 정통빵</p>
                    </div>

                    <div class="item">
                        <img src="./img/main_info02.png">
                        <h3>Baguette</h3>
                        <p>겉은 바삭하고 속은 부드러운 빵</p>
                    </div>

                    <div class="item">
                        <img src="./img/main_info03.png">
                        <h3>Country Bread</h3>
                        <p>건강한 천연 발효 빵</p>
                    </div>

                </div>

            </div>
        </section>


        <footer class="footer">
            <div class="inner">
                <p>© 2026 오늘의 빵 Bakery</p>
            </div>
        </footer>

    </div>

</body>

</html>
